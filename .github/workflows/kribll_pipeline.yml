name: Kribbl Pipeline

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch: {}

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pandas openai requests

      - name: 01 — BOAMP Scraper
        run: python scripts/01_boamp_scraper.py

      - name: 02 — TED Scraper
        run: python scripts/02_ted_scraper.py

      - name: 03 — Master Pipeline
        run: python scripts/03_master_pipeline.py

      - name: 04 — AI Summary (Leman)
        run: python scripts/04_ai_summary.py

      - name: 05 — Top Feed
        run: python scripts/05_top_feed.py

      - name: 06 — Vider Supabase et uploader
        run: |
          python -c "
          import requests, os
          url = os.environ['SUPABASE_URL']
          key = os.environ['SUPABASE_KEY']
          headers = {'apikey': key, 'Authorization': f'Bearer {key}'}
          r = requests.delete(f'{url}/rest/v1/tenders?id=gte.0', headers=headers)
          print('DELETE status:', r.status_code)
          "
          python scripts/06_upload_supabase.py